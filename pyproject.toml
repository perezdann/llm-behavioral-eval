[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-behavioral-eval"
version = "1.0.1"
description = "Evaluate LLMs against behavioral specifications (AGENTS.md, Claude.md, custom rules)"
readme = "README.md"
license = {text = "GPL-3.0-only"}
requires-python = ">=3.9"
dependencies = [
    "openai>=1.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.0",
    "scipy>=1.10",
    "commitizen>=3.0",
    "python-semantic-release>=9.0",
]

[project.scripts]
behavioral-eval = "behavioral_eval.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["src/behavioral_eval"]

[tool.pytest.ini_options]
testpaths = ["tests"]

# ── Semantic Release (auto versioning + changelog + PyPI publish) ──
[tool.semantic_release]
version_variables = [
    "src/behavioral_eval/__init__.py:__version__",
    "pyproject.toml:project.version",
]
version_toml = "pyproject.toml:project.version"
tag_format = "v{version}"
commit_message = "release: v{version} [skip ci]"
commit_parser = "conventional"
major_on_zero = false

[tool.semantic_release.branches.main]
match = "main"

[tool.semantic_release.changelog]
enabled = true
file = "CHANGELOG.md"
template_dir = ".semantic_release_templates"

[tool.semantic_release.changelog.default_templates]
changelog_file = """
# CHANGELOG

{releases}

---
*This changelog is auto-generated by [python-semantic-release](https://python-semantic-release.readthedocs.io/).*
"""

release = """
## v{version} ({date})

{directory}

### {type}

{commits}

"""

[tool.semantic_release.publish]
dist_glob_patterns = ["dist/*"]
upload_to_vcs_release = true

[tool.semantic_release.remote]
name = "origin"
type = "github"
token = {env = "GH_TOKEN"}

# ── Commitizen (interactive commit helper, kept for local dev) ──
[tool.commitizen]
name = "cz_conventional_commits"
tag_format = "v$version"
version_scheme = "pep440"
version_provider = "pep621"
update_changelog_on_bump = false
changelog_incremental = false

[tool.commitizen.customize]
change_type_order = [
    "BREAKING CHANGE",
    "feat",
    "fix",
    "refactor",
    "perf",
    "docs",
    "test",
    "ci",
    "chore",
]
